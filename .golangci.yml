version: "2"
linters:
  enable:
    - gosec
    - nolintlint
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files may contain fake credentials and intentional permission settings
      - linters: [gosec]
        path: "_test\\.go$"
    paths:
      - reference
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
