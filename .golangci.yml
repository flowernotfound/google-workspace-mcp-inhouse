version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - nolintlint
    - unconvert
    - unparam
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files may contain fake credentials and intentional permission settings
      - linters: [gosec]
        path: "_test\\.go$"
      # Mock transports in tests use io.NopCloser; body closing is unnecessary
      - linters: [bodyclose]
        path: "_test\\.go$"
    paths:
      - reference
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - reference
      - third_party$
      - builtin$
      - examples$
