version: 2
project_name: google-workspace-mcp-inhouse
builds:
  - main: ./cmd/google-workspace-mcp-inhouse
    binary: google-workspace-mcp-inhouse
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - format: binary
