version: 2
project_name: google-workspace-mcp-inhouse
builds:
  - main: ./cmd/google-workspace-mcp-inhouse
    binary: google-workspace-mcp-inhouse
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: linux
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
  algorithm: sha256
sboms:
  - artifacts: binary
    documents:
      - "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}.spdx.json"
