pre-commit:
  commands:
    fmt:
      run: mise run fmt && git add -u
      stage_fixed: true
    lint:
      run: mise run lint
    actionlint:
      run: mise run actionlint
      glob: ".github/workflows/*.{yml,yaml}"
    secret-scan:
      run: mise x -- gitleaks protect --staged --config .gitleaks.toml
pre-push:
  commands:
    test:
      run: mise run test
