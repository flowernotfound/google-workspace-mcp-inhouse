[tools]
go = "1.26"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/evilmartians/lefthook" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

[tasks.build]
description = "Build the binary"
run = "go build -o google-workspace-mcp-inhouse ./cmd/google-workspace-mcp-inhouse"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run"

[tasks.fmt]
description = "Format code"
run = "goimports -w ."

[tasks.fmt-check]
description = "Check formatting"
run = "goimports -l . | grep . && exit 1 || true"
