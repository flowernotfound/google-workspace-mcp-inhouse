[tools]
go = "1.26"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.11.1"
"go:github.com/evilmartians/lefthook" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:github.com/rhysd/actionlint/cmd/actionlint" = "latest"
"go:github.com/google/yamlfmt/cmd/yamlfmt" = "latest"
"go:github.com/goreleaser/goreleaser/v2" = "latest"
gitleaks = "8.30.0"
syft = "1.41.2" # Keep in sync with anchore/sbom-action version in release.yml

[tasks.build]
description = "Build the binary"
run = "go build -o google-workspace-mcp-inhouse ./cmd/google-workspace-mcp-inhouse"

[tasks.test]
description = "Run all tests"
run = "go test -race ./..."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run"

[tasks.actionlint]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.fmt]
description = "Format all code"
run = ["golangci-lint fmt", "yamlfmt ."]

[tasks.fmt-check]
description = "Check all formatting"
run = ["golangci-lint fmt --diff", "yamlfmt -lint ."]

[tasks.release-dry-run]
description = "Dry-run GoReleaser to verify release config"
run = "goreleaser release --snapshot --clean"

[tasks.secret-scan]
description = "Scan for secrets and credentials"
run = "gitleaks detect --source . --config .gitleaks.toml"
